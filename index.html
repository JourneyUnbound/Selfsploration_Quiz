<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Unbound™ | Selfsploration Journey</title>
    <style>
        :root {
            --cotton-candy: #E8A0A8;
            --indigo: #4E038C;
            --bondi-blue: #0891B2;
            --ocean-mist: #14B8A6;
            --deep-twilight: #120F73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--indigo) 0%, var(--deep-twilight) 100%);
            color: white;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: Georgia, serif;
        }

        .logo-header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 2px solid var(--cotton-candy);
            margin-bottom: 2rem;
        }

        .logo-header h1 {
            font-size: 2.5rem;
            color: var(--cotton-candy);
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-style: italic;
            color: var(--ocean-mist);
        }

        .quiz-section {
            display: block; /* Modified to show by default for testing */
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--cotton-candy);
        }

        .scene-setting {
            font-style: italic;
            color: var(--ocean-mist);
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 3px solid var(--cotton-candy);
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .answer-btn {
            padding: 1rem;
            background: rgba(8, 145, 178, 0.3);
            border: 2px solid var(--bondi-blue);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .answer-btn:hover {
            background: var(--bondi-blue);
            transform: translateX(5px);
        }

        .answer-btn.selected {
            background: var(--cotton-candy);
            border-color: var(--indigo);
            color: var(--deep-twilight);
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            border: none;
        }

        .btn-primary {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--indigo);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--cotton-candy);
            color: var(--cotton-candy);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .progress-indicator {
            text-align: center;
            margin: 1rem 0;
            color: var(--ocean-mist);
        }

        .result-section {
            display: none;
            text-align: center;
            padding: 3rem;
        }

        .result-title {
            font-size: 3rem;
            color: var(--cotton-candy);
            margin-bottom: 1rem;
        }

        .mythology-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            margin: 2rem 0;
            text-align: left;
            border: 2px solid var(--indigo);
        }

        .myth-title {
            color: var(--ocean-mist);
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .myth-summary {
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .core-message {
            font-style: italic;
            color: var(--cotton-candy);
            font-size: 1.2rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--bondi-blue);
        }

        .restart-btn {
            margin-top: 2rem;
            padding: 1rem 3rem;
            background: var(--ocean-mist);
            color: var(--deep-twilight);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container" id="quizContainer">
        <div class="logo-header">
            <h1>Journey Unbound™</h1>
            <p class="tagline">Illuminate your story</p>
        </div>

        <div class="quiz-section" id="questionSection">
            <div class="progress-indicator" id="progressIndicator">

            <div class="question-card">
                <div class="scene-setting" id="sceneSetting"></div>
                <h3 class="question-text" id="questionText"></h3>
                <div class="answer-options" id="answerOptions"></div>
            </div>

            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <h2 class="result-title">Your Journey Archetype</h2>
            
            <div class="mythology-box">

                </div>
                <div class="core-message" id="resultOrientation"></div>
            </div>

            <button class="btn btn-primary restart-btn" onclick="retakeQuiz()">Retake Journey</button>
        </div>
    </div>

                    { archetype: 'Deep Eye', orientation: 'Unbound', score: 2, text: "You see both views clearly allowing you to choose the one that resonates best." },
                    { archetype: 'Threader', orientation: 'Bound', score: -1, text: "You choose to hold your perspective to see where it could lead and you follow that direction." },

                ]

        ];

        // ========== STATE MANAGEMENT ==========
        let currentQuestionIdx = 0;
        let selectedAnswers = new Array(QUESTIONS.length).fill(null);

        // ========== RUN QUIZ INITIALIZATION ==========
        window.onload = function() {
            renderQuestion();
        };

        // ========== CORE FUNCTIONS ==========
        function renderQuestion() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];
            
            // Update UI Counters
            document.getElementById("currentQuestionNumber").innerText = currentQuestionIdx + 1;
            document.getElementById("sceneSetting").innerText = currentQuestion.scene;
            document.getElementById("questionText").innerText = currentQuestion.question;
            
            // Set up Back Button state
            document.getElementById("prevBtn").disabled = (currentQuestionIdx === 0);
            
            // Change Next Button text on final question
            const nextBtn = document.getElementById("nextBtn");
            if (currentQuestionIdx === QUESTIONS.length - 1) {
                nextBtn.innerText = "View Results";
            } else {
                nextBtn.innerText = "Next";
            }

            // Render Answer Buttons
            const optionsContainer = document.getElementById("answerOptions");
            optionsContainer.innerHTML = "";

            currentQuestion.answers.forEach((ans, index) => {
                const button = document.createElement("button");
                button.className = "answer-btn";
                if (selectedAnswers[currentQuestionIdx] === index) {
                    button.classList.add("selected");
                }
                button.innerText = ans.text;
                button.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(answerIndex) {
            selectedAnswers[currentQuestionIdx] = answerIndex;
            
            // Re-render quickly to display selection color styling
            renderQuestion();
        }

        function nextQuestion() {
            // Guard clause: Ensure tester selects an option before skipping ahead
            if (selectedAnswers[currentQuestionIdx] === null) {
                alert("Please select an answer before continuing your journey.");
                return;
            }

            if (currentQuestionIdx < QUESTIONS.length - 1) {
                currentQuestionIdx++;
                renderQuestion();
            } else {
                calculateAndShowResults();
            }
        }

        function prevQuestion() {
            if (currentQuestionIdx > 0) {
                currentQuestionIdx--;
                renderQuestion();
            }
        }

        function calculateAndShowResults() {
            // Archetype Counters
            const archetypeScores = {
                'Pathwalker': 0,
                'Ember-Keeper': 0,
                'Metamorph': 0,
                'Deep Eye': 0,
                'Threader': 0
            };
            
            // Bound vs Unbound Total Shift Tracker
            let totalOrientationScore = 0;

            // Process selections
            selectedAnswers.forEach((ansIdx, qIdx) => {
                const answerData = QUESTIONS[qIdx].answers[ansIdx];
                
                // Increment Archetype tallies
                archetypeScores[answerData.archetype] += 1;
                
                // Track net orientation velocity 
                totalOrientationScore += answerData.score;
            });

            // Find Archetype with highest frequency chosen
            let primaryArchetype = 'Pathwalker';
            let maxCount = -1;
            for (const [arch, count] of Object.entries(archetypeScores)) {
                if (count > maxCount) {
                    maxCount = count;
                    primaryArchetype = arch;
                }
            }

            // Determine Net Orientation Status
            let finalOrientation = "";
            if (totalOrientationScore > 0) {
                finalOrientation = "Your core movement profile trends towards: Unbound (Expansive, Magnetic, Free-Flowing Evolution)";
            } else if (totalOrientationScore < 0) {
                finalOrientation = "Your core movement profile trends towards: Bound (Grounded, Dedicated, Structure-Honoring Evolution)";
            } else {
                finalOrientation = "Your core movement profile rests in: Perfect Equilibrium (Balanced Integration of Boundaries & Freedom)";
            }

            // Hide Quiz Interface and show calculated properties
            document.getElementById("questionSection").style.display = "none";
            
            const resultSection = document.getElementById("resultSection");
            resultSection.style.display = "block";
            
            document.getElementById("resultArchetype").innerText = primaryArchetype;
            document.getElementById("resultOrientation").innerText = finalOrientation;
        }

        function retakeQuiz() {
            currentQuestionIdx = 0;
            selectedAnswers = new Array(QUESTIONS.length).fill(null);
            
            document.getElementById("resultSection").style.display = "none";
            document.getElementById("questionSection").style.display = "block";
            
            renderQuestion();
        }
    </script>
</body>
</html>
