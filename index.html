<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Unbound™ | Selfsploration Journey</title>
    <style>
        :root {
            --cotton-candy: #E8A0A8;
            --indigo: #4E038C;
            --bondi-blue: #0891B2;
            --ocean-mist: #14B8A6;
            --deep-twilight: #120F73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--indigo) 0%, var(--deep-twilight) 100%);
            color: white;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: Georgia, serif;
        }

        .logo-header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 2px solid var(--cotton-candy);
            margin-bottom: 2rem;
        }

        .logo-header h1 {
            font-size: 2.5rem;
            color: var(--cotton-candy);
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-style: italic;
            color: var(--ocean-mist);
        }

        .quiz-section {
            display: block;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--cotton-candy);
        }

        .scene-setting {
            font-style: italic;
            color: var(--ocean-mist);
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 3px solid var(--cotton-candy);
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .answer-btn {
            padding: 1rem;
            background: rgba(8, 145, 178, 0.3);
            border: 2px solid var(--bondi-blue);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .answer-btn:hover {
            background: var(--bondi-blue);
            transform: translateX(5px);
        }

        .answer-btn.selected {
            background: var(--cotton-candy);
            border-color: var(--indigo);
            color: var(--deep-twilight);
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            border: none;
        }

        .btn-primary {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--indigo);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--cotton-candy);
            color: var(--cotton-candy);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .progress-indicator {
            text-align: center;
            margin: 1rem 0;
            color: var(--ocean-mist);
        }

        .result-section {
            display: none;
            padding: 1rem;
        }

        .result-title {
            font-size: 2.2rem;
            color: var(--cotton-candy);
            text-align: center;
            margin-bottom: 2rem;
        }

        .passport-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--bondi-blue);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(15px);
            margin-bottom: 2rem;
        }

        .archetype-badge {
            display: inline-block;
            background: var(--indigo);
            color: var(--cotton-candy);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--cotton-candy);
        }

        .passport-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #f3f4f6;
        }

        .mythology-box {
            background: rgba(18, 15, 115, 0.6);
            border-left: 4px solid var(--ocean-mist);
            padding: 1.5rem;
            border-radius: 0 12px 12px 0;
            margin-bottom: 2rem;
        }

        .myth-title {
            color: var(--ocean-mist);
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
        }

        .myth-summary {
            font-style: italic;
            font-size: 1rem;
            color: #e5e7eb;
            margin-bottom: 1rem;
        }

        .core-message {
            font-weight: bold;
            color: var(--cotton-candy);
            border-top: 1px dashed rgba(232, 160, 168, 0.3);
            padding-top: 0.75rem;
        }

        .prompt-box {
            background: rgba(20, 184, 166, 0.15);
            border: 1px solid var(--ocean-mist);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
        }

        .prompt-title {
            color: var(--ocean-mist);
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .prompt-text {
            font-size: 1.1rem;
            font-family: Georgia, serif;
        }

        .restart-container {
            text-align: center;
        }

        .restart-btn {
            padding: 1rem 3rem;
            background: var(--ocean-mist);
            color: var(--deep-twilight);
            font-weight: bold;
        }
        
        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <div class="container" id="quizContainer">
        <div class="logo-header">
            <h1>Journey Unbound™</h1>
            <p class="tagline">Illuminate your Storey</p>
        </div>

        <div class="quiz-section" id="questionSection">
            <div class="progress-indicator" id="progressIndicator">
                Question <span id="currentQuestionNumber">1</span> of 10
            </div>

            <div class="question-card">
                <div class="scene-setting" id="sceneSetting"></div>
                <h3 class="question-text" id="questionText"></h3>
                <div class="answer-options" id="answerOptions"></div>
            </div>

            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button>
            </div>
        </div>

        <div class="result-section" id="resultSection">
            <h2 class="result-title">Your Selfsploration™ Passport</h2>
            
            <div class="passport-card">
                <div class="archetype-badge" id="resBadge">Archetype × Orientation</div>
                <div class="passport-desc" id="resPassportDesc"></div>
                
                <div class="mythology-box">
                    <h3 class="myth-title" id="resMythTitle">Mythological Mirror</h3>
                    <div class="myth-summary" id="resMythSummary"></div>
                    <div class="core-message" id="resCoreMessage"></div>
                </div>

                <div class="prompt-box">
                    <div class="prompt-title">Inquiry Prompt</div>
                    <div class="prompt-text" id="resPromptText"></div>
                </div>
            </div>

            <div class="restart-container">
                <button class="btn btn-primary restart-btn" onclick="retakeQuiz()">Retake Journey</button>
            </div>
        </div>
        
        <div class="footer-note">
            © 2026 Scarlet Woods / Journey Unbound Inc.™
        </div>
    </div>

    <script>
        // ARCHETYPE DATABASE (Fully updated with Version 6 Content)
        const ARCHETYPE_CONTENT = {
            "Pathwalker": {
                "Bound": {
                    desc: "You meet intensity by returning to your own direction instead of chasing every pull around you. When something tugs at you, you place a hand on your chest, check it against your values, and move only when it fits. You handle decisions by seeing them as steps you choose, not as tests you must pass. This state reminds you that you can always adjust your route while honoring what matters most to you. You stand steady, feet grounded, as you walk your chosen path.",
                    mythTitle: "Ulysses of Ithaca — The Vowkeeper",
                    mythText: "After the Trojan War, Ulysses spends ten years choosing his way back to Ithaca and his wife, Penelope. He blinds the Cyclops to escape danger, ties himself to the mast to ride out the Sirens' song, steers between Scylla and Charybdis, and refuses Calypso's offer of comfort. Each decision puts his promise to return above ease, distraction, or delay.",
                    core: "Keep the commitments that matter most, even when many easier options appear.",
                    prompt: "What promise are you actively choosing to keep right now?"
                },
                "Unbound": {
                    desc: "You respond strongly to what feels alive and interesting around you. External pulls—people, places, ideas—can change your direction quickly, and you often learn by trying things on the move. You handle boundaries by noticing when something feels less energizing and letting curiosity lead you into new terrain. In this state, your power is in choosing which pulls to follow and which to ignore as you shape your next turn. You feel the wind shift and step toward the new horizon.",
                    mythTitle: "Odin the Wanderer — The Seeker",
                    mythText: "Odin leaves the safety of Asgard to search the Nine Worlds for knowledge. He trades an eye for a drink from Mímir's well, hangs on the World Tree to learn the runes, and sends his ravens out each day to gather new information. He keeps choosing movement, risk, and learning over staying comfortable and certain.",
                    core: "When you value truth, you choose to step toward it, even when it asks something of you.",
                    prompt: "What kind of knowledge are you willing to journey for right now?"
                }
            },
            "Ember-Keeper": {
                "Bound": {
                    desc: "You meet intensity by turning inward and checking how you actually feel before you react. You tend your energy, your time, and the people or projects that matter most, even when others invite more of your attention. Emotional regulation for you looks like slowing down, breathing deeply, and choosing what to keep close. This state highlights your ability to select what you nurture and what you gently set aside. You cup your hands around your inner light, keeping it warm and steady.",
                    mythTitle: "Hestia — Keeper of the Hearth",
                    mythText: "Hestia stays at the center of the gods' halls, tending the fire that must not go out. Cities and homes keep a hearth for her, and new fires are lit from older coals so the line is never broken. She deliberately avoids drama and power struggles so she can protect the place people return to for safety and connection.",
                    core: "Protect the spaces and relationships that help you feel steady, even when other things pull at your attention.",
                    prompt: "What \"hearth\" in your life are you choosing to keep warm and stable right now?"
                },
                "Unbound": {
                    desc: "You tend to radiate your feelings into the space around you. When you're lit up, you share that warmth freely and it often lifts others; when you feel discomfort, you notice where it wants to flow. You manage boundaries by deciding how much of your fire to share and with whom. In this state, your agency shows up in how you direct your energy—who you warm, what you amplify, and when you pause to recharge. You feel your own glow expand to touch the room.",
                    mythTitle: "Brigid — Flame on the Road",
                    mythText: "Brigid moves through fields, homes, and workshops, bringing blessings, song, and healing. Her sacred flame at Kildare is tended by many hands and then carried out to light new fires in other places. She uses her warmth to encourage growth, creativity, and care wherever she goes.",
                    core: "Your warmth and encouragement can travel; you decide where to bring it.",
                    prompt: "Who in your life could benefit from your warmth and support right now?"
                }
            },
            "Metamorph": {
                "Bound": {
                    desc: "You experience change as something you can design from the inside out. When a pattern isn't working, you look at what needs to shift in your beliefs, habits, or roles and then choose specific changes. You regulate emotion by giving it a purpose—using discomfort as data for what to adjust rather than as something to get lost in. This state centers your power to change yourself on purpose instead of waiting for life to force it on you. You visualize the new form you are building, brick by brick. As you explore each shape, you hold steady until one feels truly yours.",
                    mythTitle: "Peleus & Thetis — The Shape-Shifter's Gift",
                    mythText: "The sea nymph Thetis could change into many forms—fire, water, wind, even a lioness. When Peleus loved her, he held steady as she shifted again and again. He did not chase or force; he simply remained present until she settled into her true form. In that stillness, she chose to stay human and walk beside him.",
                    core: "When you hold steady through your own changes, you discover which version of yourself feels most real.",
                    prompt: "What part of yourself feels ready to settle and stay, after all the shifting?"
                },
                "Unbound": {
                    desc: "You often find yourself changing quickly in response to what's happening around you. New situations, people, or moods can reshape how you show up, sometimes before you've named it. You navigate boundaries by noticing which changes feel like growth and which leave you feeling stretched beyond your capacity. In this state, your agency is in deciding which versions of you to keep, which to retire, and when to step out of constant adaptation. You watch your own reflection shift and smile at the new face.",
                    mythTitle: "Inanna — The One Who Descends and Rises",
                    mythText: "Inanna chooses to enter the underworld ruled by her sister, Ereshkigal. At each of seven gates she gives up a sign of status, enters a deep stillness, and rests in the dark. When the proper acts of surrender are completed, she is restored and returns carrying the power of having gone down and come back again.",
                    core: "Sometimes you choose to move through deep change, release old layers, and rebuild with a different kind of strength.",
                    prompt: "What are you willing to release right now so you can come back clearer and more grounded?"
                }
            },
            "Threader": {
                "Bound": {
                    desc: "You meet pressure by zooming out and looking at the pattern of your life—what has repeated, what has helped, and what has required from you. You make choices by weighing how each option fits into the story you want to tell, not just how it feels in the moment. Emotional regulation often comes from recognizing, \"I've been here before,\" and choosing a different response. This state highlights your ability to select which threads of Fate you keep weaving and which you lay down. You trace the line of your history with your finger, choosing the next knot.",
                    mythTitle: "The Moirai — Keepers of Fate's Thread",
                    mythText: "The three Moirai handle each person's thread of Fate: one spins it, one measures it, and one cuts it. They work steadily, placing each thread where it belongs in the larger pattern. Even the gods take their work seriously and adjust their actions around it.",
                    core: "You can look at the lines running through your life and deliberately choose which ones to keep carrying.",
                    prompt: "Which thread of Fate in your life are you choosing to keep following right now?"
                },
                "Unbound": {
                    desc: "You are sensitive to timing and openings in your environment. When things line up—people, resources, chance meetings—you often feel invited to move, and you go with that flow. You work with boundaries by noticing when a situation feels supported versus forced. In this state, your agency lies in deciding which apparent \"right moments\" you act on and which you allow to pass. You see the door open and step through because the light calls to you.",
                    mythTitle: "The Norns — Weavers at the Roots",
                    mythText: "At the roots of Yggdrasil, the Norns fetch water, carve runes, and set each life's thread of Fate. As they work, certain crossings and chances become available on the surface—moments when taking action fits smoothly into the pattern. Travelers notice these openings and decide whether to step through or keep waiting.",
                    core: "You can pay attention to the chances that appear and decide which ones you will act on.",
                    prompt: "Looking at your life as it is now, what specific opportunity are you ready to act on?"
                }
            },
            "Deep Eye": {
                "Bound": {
                    desc: "You experience intensity as a signal to slow down and look inward. Before speaking or acting, you place a hand on your heart and check what feels true to you and what might be projection or habit. You manage emotions by observing them closely and letting understanding guide your next move, rather than reacting on impulse. This state emphasizes your ability to choose responses that align with your deeper insight, even when others want quick answers. You sit quietly, watching your thoughts drift like clouds.",
                    mythTitle: "Völva — Seer in the Circle",
                    mythText: "A völva sits inside a marked circle with her staff while people ask about harvests, storms, or war. She stays quiet, looks within, and waits until what she sees feels clear. Only then does she speak about what is likely to come so others can plan.",
                    core: "When you pause and look inward first, your next step tends to be calmer and more considered.",
                    prompt: "If you gave yourself a moment of quiet today, what decision might become clearer?"
                },
                "Unbound": {
                    desc: "You move through the world noticing patterns, inconsistencies, and unspoken dynamics. External situations quickly trigger observations in you, and you may feel a pull to name what others are missing. You handle boundaries by deciding when to share what you see and when to keep it to yourself to avoid overload. In this state, your power is in choosing how to use your perspective—to guide, to question, or simply to understand your environment more clearly. You scan the horizon and spot the hidden path others missed.",
                    mythTitle: "Tiresias — Sight on the Road",
                    mythText: "Tiresias gains the gift of prophecy in exchange for his physical sight. He has lived as both man and woman and now walks with travelers and advises leaders. As he moves, he notices sounds, signs, and patterns others ignore, and he speaks plainly about what likely lies ahead.",
                    core: "Paying close attention to what you notice can help you name what others are missing.",
                    prompt: "What truth do you see about a situation that you feel called to share?"
                }
            }
        };

                    { archetype: 'Threader', value: 1, orientation: 'Unbound', text: "I check my phone for notifications or messages." },

                ]
            },
            {

                scene: "A friend pays you a genuine compliment about who you are.",
                question: "How do you respond?",
                answers: [
                    { archetype: 'Pathwalker', value: -2, orientation: 'Bound', text: "I accept the truth of their words and store it as fuel for my journey." },
                    { archetype: 'Pathwalker', value: 2, orientation: 'Unbound', text: "I feel grateful and respond with a smile." },
                    { archetype: 'Ember-Keeper', value: -2, orientation: 'Bound', text: "I modestly brush it off and redirect the conversation." },
                    { archetype: 'Ember-Keeper', value: 2, orientation: 'Unbound', text: "I return the compliment or share my gratitude openly." },
                    { archetype: 'Metamorph', value: -1, orientation: 'Bound', text: "I let the compliment reshape how I see myself for a moment." },
                    { archetype: 'Metamorph', value: 1, orientation: 'Unbound', text: "I share how hearing this changes my mood and lifts my spirits." },
                    { archetype: 'Threader', value: -1, orientation: 'Bound', text: "I acknowledge the compliment and express my appreciation." },
                    { archetype: 'Threader', value: 1, orientation: 'Unbound', text: "I acknowledge the beauty of their perception and how it weaves us closer." },
                    { archetype: 'Deep Eye', value: -2, orientation: 'Bound', text: "I thank them warmly and accept it inwardly." },
                    { archetype: 'Deep Eye', value: 2, orientation: 'Unbound', text: "I watch the warmth spread in my chest and let it guide my smile." }
                ]
            },
            {
                id: 10,
                scene: "After a warm visit with a close friend, you are walking home.",
                question: "What do you feel on your walk home?",
                answers: [
                    { archetype: 'Pathwalker', value: -2, orientation: 'Bound', text: "I carry the clarity of our connection as a steady compass for my next steps." },
                    { archetype: 'Pathwalker', value: 2, orientation: 'Unbound', text: "I feel energized and motivated." },
                    { archetype: 'Ember-Keeper', value: -2, orientation: 'Bound', text: "I savor the moment of human connection." },
                    { archetype: 'Ember-Keeper', value: 2, orientation: 'Unbound', text: "I carry a sense of gratitude and openness." },
                    { archetype: 'Metamorph', value: -1, orientation: 'Bound', text: "I notice how the experience has softened my inner landscape." },
                    { archetype: 'Metamorph', value: 1, orientation: 'Unbound', text: "I feel inspired by the connection we shared." },
                    { archetype: 'Threader', value: -1, orientation: 'Bound', text: "I reflect on the pattern of care we shared and how it strengthens our bond." },
                    { archetype: 'Threader', value: 1, orientation: 'Unbound', text: "I think about what I want to share next with my friend." },
                    { archetype: 'Deep Eye', value: -2, orientation: 'Bound', text: "Warmth and contentment fill me." },
                    { archetype: 'Deep Eye', value: 2, orientation: 'Unbound', text: "I feel the lingering resonance of our conversation echoing in the quiet street." }
                ]
            }
        ];

        // ENGINE MATRIX DISTRIBUTION MAP (Exactly 3 fixed options parsed smoothly per question)
        const ASSIGNED_ROTATION_MAP = [
            [ {a: 'Pathwalker', o: 'Bound'},   {a: 'Ember-Keeper', o: 'Unbound'}, {a: 'Metamorph', o: 'Bound'} ],   // Q1
            [ {a: 'Pathwalker', o: 'Unbound'}, {a: 'Metamorph', o: 'Unbound'}, {a: 'Threader', o: 'Bound'} ],     // Q2
            [ {a: 'Ember-Keeper', o: 'Bound'},   {a: 'Threader', o: 'Unbound'}, {a: 'Deep Eye', o: 'Bound'} ],     // Q3
            [ {a: 'Pathwalker', o: 'Bound'},   {a: 'Deep Eye', o: 'Unbound'}, {a: 'Threader', o: 'Bound'} ],     // Q4
            [ {a: 'Ember-Keeper', o: 'Unbound'}, {a: 'Metamorph', o: 'Bound'},   {a: 'Deep Eye', o: 'Unbound'} ],   // Q5
            [ {a: 'Pathwalker', o: 'Unbound'}, {a: 'Ember-Keeper', o: 'Bound'},   {a: 'Threader', o: 'Unbound'} ],   // Q6
            [ {a: 'Metamorph', o: 'Unbound'}, {a: 'Deep Eye', o: 'Bound'},     {a: 'Pathwalker', o: 'Bound'} ],   // Q7
            [ {a: 'Ember-Keeper', o: 'Bound'},   {a: 'Threader', o: 'Bound'},     {a: 'Deep Eye', o: 'Unbound'} ],   // Q8
            [ {a: 'Pathwalker', o: 'Unbound'}, {a: 'Ember-Keeper', o: 'Unbound'}, {a: 'Metamorph', o: 'Bound'} ],   // Q9
            [ {a: 'Metamorph', o: 'Unbound'}, {a: 'Threader', o: 'Unbound'},   {a: 'Deep Eye', o: 'Bound'} ]      // Q10
        ];

        let currentQuestionIdx = 0;
        let selectedAnswers = new Array(QUESTIONS.length).fill(null);
        let archetypeDiscoveryOrder = [];
        let activeQuestionSubsets = new Array(QUESTIONS.length).fill(null);

        window.onload = function() {
            loadQuestionLayout();
        };

        function loadQuestionLayout() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];

            if (activeQuestionSubsets[currentQuestionIdx] === null) {
                const targetLayout = ASSIGNED_ROTATION_MAP[currentQuestionIdx];
                let subset = [];

                targetLayout.forEach(target => {
                    const foundIndex = currentQuestion.answers.findIndex(ans => 
                        ans.archetype === target.a && ans.orientation === target.o
                    );
                    if (foundIndex !== -1) {
                        subset.push({
                            data: currentQuestion.answers[foundIndex],
                            originalIndex: foundIndex
                        });
                    }
                });

                if (subset.length < 3) {
                    subset = [];
                    let choicePool = currentQuestion.answers.map((ans, idx) => ({ data: ans, originalIndex: idx }));
                    while (subset.length < 3 && choicePool.length > 0) {
                        const randIndex = Math.floor(Math.random() * choicePool.length);
                        subset.push(choicePool[randIndex]);
                        choicePool.splice(randIndex, 1);
                    }
                }
                activeQuestionSubsets[currentQuestionIdx] = subset;
            }

            renderQuestion();
        }

        function renderQuestion() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];
            document.getElementById("currentQuestionNumber").innerText = currentQuestionIdx + 1;
            document.getElementById("sceneSetting").innerText = currentQuestion.scene;
            document.getElementById("questionText").innerText = currentQuestion.question;
            
            document.getElementById("prevBtn").disabled = (currentQuestionIdx === 0);
            
            const nextBtn = document.getElementById("nextBtn");
            nextBtn.innerText = (currentQuestionIdx === QUESTIONS.length - 1) ? "View Results" : "Next";

            const optionsContainer = document.getElementById("answerOptions");
            optionsContainer.innerHTML = "";

            const lockedSubset = activeQuestionSubsets[currentQuestionIdx];

            lockedSubset.forEach((item) => {
                const button = document.createElement("button");
                button.className = "answer-btn";
                
                if (selectedAnswers[currentQuestionIdx] === item.originalIndex) {
                    button.classList.add("selected");
                }
                
                button.innerText = item.data.text;
                button.onclick = () => selectAnswer(item.originalIndex);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(originalIndex) {
            selectedAnswers[currentQuestionIdx] = originalIndex;
            
            const currentQuestion = QUESTIONS[currentQuestionIdx];
            const arch = currentQuestion.answers[originalIndex].archetype;
            if (!archetypeDiscoveryOrder.includes(arch)) {
                archetypeDiscoveryOrder.push(arch);
            }
            
            renderQuestion();
        }

        function nextQuestion() {
            if (selectedAnswers[currentQuestionIdx] === null) {
                alert("Please select an option to continue your journey.");
                return;
            }

            if (currentQuestionIdx < QUESTIONS.length - 1) {
                currentQuestionIdx++;
                loadQuestionLayout();
            } else {
                calculateAndShowResults();
            }
        }

        function prevQuestion() {
            if (currentQuestionIdx > 0) {
                currentQuestionIdx--;
                loadQuestionLayout();
            }
        }

        function calculateAndShowResults() {
            const archetypeScores = { 'Pathwalker': 0, 'Ember-Keeper': 0, 'Metamorph': 0, 'Deep Eye': 0, 'Threader': 0 };
            let orientationCumulativeScore = 0;

            selectedAnswers.forEach((ansIdx, qIdx) => {
                const question = QUESTIONS[qIdx];
                const answerData = question.answers[ansIdx];
                
                archetypeScores[answerData.archetype] += 1;
                orientationCumulativeScore += answerData.value;
            });

            let primaryArchetype = '';
            let maxArchScore = -1;
            
            for (const arch in archetypeScores) {
                const score = archetypeScores[arch];
                if (score > maxArchScore) {
                    maxArchScore = score;
                    primaryArchetype = arch;
                } else if (score === maxArchScore) {
                    const indexCurrentMax = archetypeDiscoveryOrder.indexOf(primaryArchetype);
                    const indexChallenger = archetypeDiscoveryOrder.indexOf(arch);
                    if (indexChallenger < indexCurrentMax) {
                        primaryArchetype = arch;
                    }
                }
            }

            let primaryOrientation = 'Bound';
            if (orientationCumulativeScore > 0) {
                primaryOrientation = 'Unbound';
            } else if (orientationCumulativeScore === 0) {
                primaryOrientation = Math.random() < 0.5 ? 'Bound' : 'Unbound';
            }

            const resultData = ARCHETYPE_CONTENT[primaryArchetype][primaryOrientation];

            document.getElementById("questionSection").style.display = "none";
            document.getElementById("resultSection").style.display = "block";
            
            document.getElementById("resBadge").innerText = `${primaryArchetype.toUpperCase()} — ${primaryOrientation.toUpperCase()}`;
            document.getElementById("resPassportDesc").innerText = resultData.desc;
            document.getElementById("resMythTitle").innerText = resultData.mythTitle;
            document.getElementById("resMythSummary").innerText = resultData.mythText;
            document.getElementById("resCoreMessage").innerText = `Core Message: ${resultData.core}`;
            document.getElementById("resPromptText").innerText = resultData.prompt;
        }

        function retakeQuiz() {
            currentQuestionIdx = 0;
            selectedAnswers = new Array(QUESTIONS.length).fill(null);
            activeQuestionSubsets = new Array(QUESTIONS.length).fill(null);
            archetypeDiscoveryOrder = [];
            
            document.getElementById("resultSection").style.display = "none";
            document.getElementById("questionSection").style.display = "block";
            
            loadQuestionLayout();
        }
    </script>
