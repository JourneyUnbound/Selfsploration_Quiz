<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Unbound™ | Selfsploration Journey</title>
    <style>
        :root {
            --cotton-candy: #E8A0A8;
            --indigo: #4E038C;
            --bondi-blue: #0891B2;
            --ocean-mist: #14B8A6;
            --deep-twilight: #120F73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--indigo) 0%, var(--deep-twilight) 100%);
            color: white;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: Georgia, serif;
        }

        .logo-header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 2px solid var(--cotton-candy);
            margin-bottom: 2rem;
        }

        .logo-header h1 {
            font-size: 2.5rem;
            color: var(--cotton-candy);
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-style: italic;
            color: var(--ocean-mist);
        }

        .quiz-section {
            display: block;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--cotton-candy);
        }

        .scene-setting {
            font-style: italic;
            color: var(--ocean-mist);
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 3px solid var(--cotton-candy);
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .answer-btn {
            padding: 1rem;
            background: rgba(8, 145, 178, 0.3);
            border: 2px solid var(--bondi-blue);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .answer-btn:hover {
            background: var(--bondi-blue);
            transform: translateX(5px);
        }

        .answer-btn.selected {
            background: var(--cotton-candy);
            border-color: var(--indigo);
            color: var(--deep-twilight);
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            border: none;
        }

        .btn-primary {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--indigo);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--cotton-candy);
            color: var(--cotton-candy);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .progress-indicator {
            text-align: center;
            margin: 1rem 0;
            color: var(--ocean-mist);
        }

        .result-section {
            display: none;
            padding: 1rem;
        }

        .result-title {
            font-size: 2.2rem;
            color: var(--cotton-candy);
            text-align: center;
            margin-bottom: 2rem;
        }

        .passport-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--bondi-blue);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(15px);
            margin-bottom: 2rem;
        }

        .archetype-badge {
            display: inline-block;
            background: var(--indigo);
            color: var(--cotton-candy);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--cotton-candy);
        }

        .passport-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #f3f4f6;
        }

        .mythology-box {
            background: rgba(18, 15, 115, 0.6);
            border-left: 4px solid var(--ocean-mist);
            padding: 1.5rem;
            border-radius: 0 12px 12px 0;
            margin-bottom: 2rem;
        }

        .myth-title {
            color: var(--ocean-mist);
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
        }

        .myth-summary {
            font-style: italic;
            font-size: 1rem;
            color: #e5e7eb;
            margin-bottom: 1rem;
        }

        .core-message {
            font-weight: bold;
            color: var(--cotton-candy);
            border-top: 1px dashed rgba(232, 160, 168, 0.3);
            padding-top: 0.75rem;
        }

        .prompt-box {
            background: rgba(20, 184, 166, 0.15);
            border: 1px solid var(--ocean-mist);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
        }

        .prompt-title {
            color: var(--ocean-mist);
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .prompt-text {
            font-size: 1.1rem;
            font-family: Georgia, serif;
        }

        .restart-container {
            text-align: center;
        }

        .restart-btn {
            padding: 1rem 3rem;
            background: var(--ocean-mist);
            color: var(--deep-twilight);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="quizContainer">
        <div class="logo-header">
            <h1>Journey Unbound™</h1>
            <p class="tagline">Illuminate your story</p>
        </div>

        <!-- Main Quiz Interface -->
        <div class="quiz-section" id="questionSection">
            <div class="progress-indicator" id="progressIndicator">
                Question <span id="currentQuestionNumber">1</span> of 10
            </div>

            <div class="question-card">
                <div class="scene-setting" id="sceneSetting"></div>
                <h3 class="question-text" id="questionText"></h3>
                <div class="answer-options" id="answerOptions"></div>
            </div>

            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button>
            </div>
        </div>

        <!-- Calculated Results Display -->
        <div class="result-section" id="resultSection">
            <h2 class="result-title">Your Selfsploration™ Passport</h2>
            
            <div class="passport-card">
                <div class="archetype-badge" id="resBadge">Archetype × Orientation</div>
                <div class="passport-desc" id="resPassportDesc"></div>
                
                <div class="mythology-box">
                    <h3 class="myth-title" id="resMythTitle">Mythological Mirror</h3>
                    <div class="myth-summary" id="resMythSummary"></div>
                    <div class="core-message" id="resCoreMessage"></div>
                </div>

                <div class="prompt-box">
                    <div class="prompt-title">Inquiry Prompt</div>
                    <div class="prompt-text" id="resPromptText"></div>
                </div>
            </div>

            <div class="restart-container">
                <button class="btn btn-primary restart-btn" onclick="retakeQuiz()">Retake Journey</button>
            </div>
        </div>
    </div>

    <script>
        // Separate axis weight scales to allow clean calculation parity
        const ARCHETYPE_WEIGHTS = [1.0, 1.2, 1.4, 1.6, 1.8, 2.0]; // Q1-Q6
        const ORIENTATION_WEIGHTS = [1.0, 1.33, 1.66, 2.0];       // Q7-Q10

        // GROUNDED RESULTS DATABASE
        const ARCHETYPE_CONTENT = {
            "Pathwalker": {
                "Bound": {
                    desc: "You are the Pathwalker, and you build your own momentum on purpose. Your values, boundaries, and clear choices are practical tools. Instead of waiting for paths to clear, you take action to reveal the next step. The more intentionally you choose your direction, the more naturally your environment aligns to support you.",
                    mythTitle: "Ulysses of Ithaca — The Vowkeeper",
                    mythText: "Ulysses fights through ten years of shifting seas to return home. He navigates past the Sirens, outsmarts the Cyclops, and refuses an offer of immortality from a goddess because his loyalty belongs to his home. When he finally returns, he steps into his hall with full authority, stringing his great bow and reclaiming his life on his own terms.",
                    core: "Keep the promise. Finish the return.",
                    prompt: "What core commitment are you ready to see through to the end?"
                },
                "Unbound": {
                    desc: "You thrive on discovery and build your path dynamically as you go. You are highly adaptable, testing different options, learning what works, and bringing practical insights back to your projects. Instead of locking into a single rigid plan, you follow fresh inspiration wherever it leads, trusting your resourcefulness to guide you.",
                    mythTitle: "Odin the Wanderer — The Seeker",
                    mythText: "Odin leaves his high throne to walk the world as an ordinary traveler, seeking real knowledge. He trades a piece of his sight for a drink from the well of deep wisdom, and studies the ancient runes to understand how the world fits together. He uses his sharp mind to gather practical insights from every corner of his journey.",
                    core: "Seek what is true, even when it demands your focus.",
                    prompt: "What new insight or practical skill is worth your time and energy right now?"
                }
            },
            "Ember-Keeper": {
                "Bound": {
                    desc: "You protect and tend the emotional core of your life and work. You turn inward to understand what you genuinely feel, using those insights to anchor your choices. When external circumstances become chaotic, you pull what you care about close and keep it steady, creating a reliable foundation that won't be shaken.",
                    mythTitle: "Hestia — Keeper of the Hearth",
                    mythText: "Hestia remains at the very center of the community, tending the flame that keeps everyone warm and connected. While other forces clash outside, she ensures the heart of the home stays secure, vibrant, and alive. Her quiet presence provides the essential warmth that keeps the entire foundation running smoothly.",
                    core: "Protect the center. Keep the flame steady.",
                    prompt: "What is the core priority you need to protect and nurture right now?"
                },
                "Unbound": {
                    desc: "Your internal passion naturally moves outward to inspire others. You excel at speaking your truth directly from the heart the moment it hits you, warming up spaces and helping people recognize their own potential. Your open expression builds immediate, authentic bridges of connection wherever you go.",
                    mythTitle: "Prometheus — The Firebringer",
                    mythText: "Prometheus sees an opportunity to elevate humanity, so he acts boldly. He steals a spark of fire from the heavens, sharing it openly with the world. This single gift provides warmth, fuels creative craft, and helps people build their own independent futures, sparking an entire wave of shared human potential.",
                    core: "Share the spark. Let the flame spread.",
                    prompt: "What direct truth or creative insight are you ready to speak out loud?"
                }
            },
            "Metamorph": {
                "Bound": {
                    desc: "Transformation is your deliberate choice. When you realize a structure or a way of living no longer serves you, you intentionally break it down and design the next version of your life. Your personal growth doesn't happen by accident—you actively direct your focus to shape exactly who you choose to become.",
                    mythTitle: "The Alchemist — The Work of Great Art",
                    mythText: "Inside a focused environment, the alchemist systematically refines raw materials. Through precise steps—breaking down old compounds, clearing away impurities, and rebuilding the structure—the material is permanently upgraded into something stronger. The entire process requires absolute intention and steady execution.",
                    core: "Direct the fire. Shape your own evolution.",
                    prompt: "What part of your old routine are you intentionally clearing away to design what's next?"
                },
                "Unbound": {
                    desc: "You are exceptionally agile, changing and adapting smoothly alongside life's natural shifts. When situations evolve, you don't waste energy resisting; you fluidly recalibrate your perspective and immediately find creative opportunities within the new reality. Your growth happens in real-time as you respond to the world around you.",
                    mythTitle: "Proteus — Shepherd of the Changing Deep",
                    mythText: "Proteus is a legendary figure of the sea who possesses total awareness of the deep waters and future possibilities. When visitors seek him out for direction, he shifts shape with incredible speed—becoming a powerful lion, a rushing river, or a vibrant, burning tree. He moves flawlessly through every form, showing complete mastery over change.",
                    core: "Flow with the shift. Take the shape that releases you.",
                    prompt: "Where can you stop resisting a current change and instead use it to your creative advantage?"
                }
            },
            "Threader": {
                "Bound": {
                    desc: "You step back to view your personal history and current circumstances as an interconnected whole. By seeing the underlying patterns of your life, you intentionally choose which habits to keep and which ones to leave behind, elegantly weaving your past successes into a highly structured plan for the future.",
                    mythTitle: "Ariadne — Guide of the Core Line",
                    mythText: "Ariadne understands the complex layout of the great Labyrinth. She hands a simple spool of red thread to the hero, instructing him to anchor it at the entrance and unroll it as he goes. This clear, steady line maps the entire journey, ensuring he can face the unknown and always find his way back to safety.",
                    core: "Hold the line. Trust the connection.",
                    prompt: "Which reliable strength from your past will you use to navigate your current project?"
                },
                "Unbound": {
                    desc: "You have a natural sense for timing and structural flow. You trust the timing of events, knowing when to wait and exactly when to strike. By remaining observant, you easily spot emerging trends, collaborate seamlessly with others, and move forward precisely when the ideal window of opportunity opens.",
                    mythTitle: "The Norns — Weavers at the Roots",
                    mythText: "The Norns sit at the deep roots of the world tree, constantly observing the grand patterns of time. They track the interplay of past choices, current realities, and future potentials. Rather than forcing events, they watch the natural intersection of elements, highlighting the perfect moment for meaningful action to occur.",
                    core: "Notice the opening. Move when it’s time.",
                    prompt: "What natural opportunity is unfolding around you right now that is ready for action?"
                }
            },
            "Deep Eye": {
                "Bound": {
                    desc: "Your strength comes from profound internal clarity. You take the time to observe your thoughts and feelings completely objectively before making a move. This deliberate, mindful pause gives you an unshakeable sense of certainty, allowing you to act with absolute conviction when you decide the time is right.",
                    mythTitle: "Völva — Seer in the Circle",
                    mythText: "The völva takes a quiet, deliberate seat within a grounded space to observe what is truly happening. She clears away external noise and focuses completely inward. By looking past surface appearances, she gains an accurate view of the core situation, providing clear, grounded direction for everyone around her.",
                    core: "Look within. The next right action will become clear.",
                    prompt: "When you step away from the noise, what central truth do you instantly see?"
                },
                "Unbound": {
                    desc: "You are a master observer of dynamics and systems, picking up on crucial details that others completely miss. By naming these patterns clearly and objectively, you illuminate hidden opportunities and bring out the best in the people and teams around you, expanding what everyone thinks is possible.",
                    mythTitle: "Tiresias — Sight on the Road",
                    mythText: "Tiresias walks through changing landscapes with a deep, unshakeable perspective. While others get caught up in temporary distractions, he tunes into the underlying signals, environments, and structural directions of the journey. He shares his observations plainly, giving travelers the vital clarity they need to navigate what lies ahead.",
                    core: "Travel with eyes open. Share what’s coming.",
                    prompt: "What clear potential or asset do you see in your current situation that needs to be brought to light?"
                }
            }
        };

        // EXPLICITLY SEPARATED QUESTION MATRIX
        const QUESTIONS = [
            // --- ARCHETYPE AXIS QUESTIONS (1-6) ---
            {
                id: 1,
                axis: "archetype",
                scene: "You're standing at the edge of a chasm. Something calls from the other side.",
                question: "What is your first instinct?",
                answers: [
                    { archetype: 'Pathwalker', text: "Focus purely on the crossing ahead. You commit completely to forging your way to the other side." },
                    { archetype: 'Ember-Keeper', text: "Pause to secure your internal foundation first, protecting your core clarity before taking a step." },
                    { archetype: 'Metamorph', text: "Feel the threshold changing you internally, welcoming the deep shift required to step across." },
                    { archetype: 'Threader', text: "Look back at how your past experiences led here, linking this crossing to the rest of your story." },
                    { archetype: 'Deep Eye', text: "Observe the entire expanse in complete silence, waiting until you perceive the absolute truth of the situation." }
                ]
            },
            {
                id: 2,
                axis: "archetype",
                scene: "A close relationship or major project naturally reaches a significant fork in the road.",
                question: "Where does your focus immediately go?",
                answers: [
                    { archetype: 'Pathwalker', text: "You prioritize forging a clear, independent path forward." },
                    { archetype: 'Ember-Keeper', text: "You focus on nurturing and preserving the core emotional values built during that time." },
                    { archetype: 'Metamorph', text: "You lean fully into the transformation, allowing the transition to refine who you are." },
                    { archetype: 'Threader', text: "You trace the long-term patterns, finding meaning in how the old chapter naturally feeds into the new." },
                    { archetype: 'Deep Eye', text: "You step back to view the broader layout of both paths completely objectively." }
                ]
            },
            {
                id: 3,
                axis: "archetype",
                scene: "You are designing a brand new personal project or setting a milestone goal.",
                question: "What is your primary building tool?",
                answers: [
                    { archetype: 'Pathwalker', text: "Decisive execution and real-world milestones that build immediate momentum." },
                    { archetype: 'Ember-Keeper', text: "Ensuring the target completely aligns with your deepest, quiet internal desires." },
                    { archetype: 'Metamorph', text: "Using the project deliberately to break down old limitations and evolve your workflow." },
                    { archetype: 'Threader', text: "Weaving proven techniques and historical elements into a beautiful, coherent roadmap." },
                    { archetype: 'Deep Eye', text: "Uncovering hidden trends and system potentials that others completely overlook." }
                ]
            },
            {
                id: 4,
                axis: "archetype",
                scene: "You step into a massive, open creative venue or start a completely blank slate project where there are no pre-existing rules or explicit guidelines.",
                question: "What is your natural entry point?",
                answers: [
                    { archetype: 'Pathwalker', text: "Setting a definitive, independent goal immediately to drive your own momentum." },
                    { archetype: 'Ember-Keeper', text: "Tuning into the emotional atmosphere first, ensuring your inner state feels aligned and ready." },
                    { archetype: 'Metamorph', text: "Experimenting freely with different approaches right away, adapting your style dynamically to the open space." },
                    { archetype: 'Threader', text: "Looking for overarching themes or underlying structural links to see how the elements can connect." },
                    { archetype: 'Deep Eye', text: "Quietly observing the vast landscape to get a clear, intuitive sense of what is genuinely possible." }
                ]
            },
            {
                id: 5,
                axis: "archetype",
                scene: "You witness an extraordinary display of creative alignment or deep mastery in someone else.",
                question: "What does that inspiration trigger in you?",
                answers: [
                    { archetype: 'Pathwalker', text: "A strong drive to immediately build and forge your own version of that alignment." },
                    { archetype: 'Ember-Keeper', text: "A warm, inner spark that rekindles your dedication to what you care about most." },
                    { archetype: 'Metamorph', text: "An immediate internal shift that permanently alters how you view your potential." },
                    { archetype: 'Threader', text: "An elegant realization of how to tie that concept cleanly into your ongoing work." },
                    { archetype: 'Deep Eye', text: "A profound clarity that allows you to see the true essence of their gift." }
                ]
            },
            {
                id: 6,
                axis: "archetype",
                scene: "You are reflecting on your personal legacy and the lasting impact you choose to leave behind.",
                question: "What do you most want to share?",
                answers: [
                    { archetype: 'Pathwalker', text: "Practical maps and direct paths that help others boldly trailblaze their own lives." },
                    { archetype: 'Ember-Keeper', text: "A steady, reliable blueprint for how to deeply protect and tend what matters most." },
                    { archetype: 'Metamorph', text: "An inspiring example of conscious evolution and total self-transformation." },
                    { archetype: 'Threader', text: "The ability to look at a complex lifetime and recognize the beautiful thread running through it." },
                    { archetype: 'Deep Eye', text: "A completely clear, unshakeable perspective that reveals true possibility to the world." }
                ]
            },

            // --- ORIENTATION AXIS QUESTIONS (7-10) ---
            {
                id: 7,
                axis: "orientation",
                scene: "Consider how you manage your day-to-day energetic focus, scheduling, and personal spaces.",
                question: "Which pattern feels most native to you?",
                answers: [
                    { orientation: 'Bound', text: "Clear containment. I thrive when I have structured boundaries, precise focus, and intentional rituals to protect my energy." },
                    { orientation: 'Unbound', text: "Fluid expansion. I thrive when my energy moves freely, responding to organic timing and spontaneous inspiration." }
                ]
            },
            {
                id: 8,
                axis: "orientation",
                scene: "You are stepping into a brand-new cycle of personal growth and selfsploration.",
                question: "How do you naturally anchor this evolution?",
                answers: [
                    { orientation: 'Bound', text: "By deliberately setting new boundaries and dropping old routines to design a clear container." },
                    { orientation: 'Unbound', text: "By opening myself up to fresh connections, flowing into new spaces, and seeing where momentum leads." }
                ]
            },
            {
                id: 9,
                axis: "orientation",
                scene: "When navigating differences in values or vision within close personal or creative partnerships...",
                question: "What is your primary instinctual movement?",
                answers: [
                    { orientation: 'Bound', text: "Anchoring firmly in my individual stance, ensuring mutual respect for our completely distinct paths." },
                    { orientation: 'Unbound', text: "Leaning smoothly into relational harmony, looking for a shared flow that beautifully blends our perspectives." }
                ]
            },
            {
                id: 10,
                axis: "orientation",
                scene: "You are working toward a deeply desired outcome, connection, or creative achievement.",
                question: "How do you feel most aligned while pursuing it?",
                answers: [
                    { orientation: 'Bound', text: "Taking disciplined, deliberate action to steadily bring my vision into reality on my own terms." },
                    { orientation: 'Unbound', text: "Radiating my intent openly, trusting the natural layout of events to bring the right opportunities to me." }
                ]
            }
        ];

        let currentQuestionIdx = 0;
        let selectedAnswers = new Array(QUESTIONS.length).fill(null);
        let archetypeDiscoveryOrder = [];
        let activeQuestionSubsets = new Array(QUESTIONS.length).fill(null);

        window.onload = function() {
            loadQuestionLayout();
        };

        function loadQuestionLayout() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];

            // Only subset the Archetype questions (1-6) to keep 3 choices on screen
            if (currentQuestion.axis === "archetype" && activeQuestionSubsets[currentQuestionIdx] === null) {
                let choicePool = currentQuestion.answers.map((ans, idx) => ({ data: ans, originalIndex: idx }));
                let subset = [];

                while (subset.length < 3 && choicePool.length > 0) {
                    const randIndex = Math.floor(Math.random() * choicePool.length);
                    subset.push(choicePool[randIndex]);
                    choicePool.splice(randIndex, 1);
                }
                activeQuestionSubsets[currentQuestionIdx] = subset;
            } 
            // For Orientation (7-10), display both choices clearly to avoid hidden math skew
            else if (currentQuestion.axis === "orientation" && activeQuestionSubsets[currentQuestionIdx] === null) {
                activeQuestionSubsets[currentQuestionIdx] = currentQuestion.answers.map((ans, idx) => ({ data: ans, originalIndex: idx }));
            }

            renderQuestion();
        }

        function renderQuestion() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];
            document.getElementById("currentQuestionNumber").innerText = currentQuestionIdx + 1;
            document.getElementById("sceneSetting").innerText = currentQuestion.scene;
            document.getElementById("questionText").innerText = currentQuestion.question;
            
            document.getElementById("prevBtn").disabled = (currentQuestionIdx === 0);
            
            const nextBtn = document.getElementById("nextBtn");
            nextBtn.innerText = (currentQuestionIdx === QUESTIONS.length - 1) ? "View Results" : "Next";

            const optionsContainer = document.getElementById("answerOptions");
            optionsContainer.innerHTML = "";

            const lockedSubset = activeQuestionSubsets[currentQuestionIdx];

            lockedSubset.forEach((item) => {
                const button = document.createElement("button");
                button.className = "answer-btn";
                
                if (selectedAnswers[currentQuestionIdx] === item.originalIndex) {
                    button.classList.add("selected");
                }
                
                button.innerText = item.data.text;
                button.onclick = () => selectAnswer(item.originalIndex);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(originalIndex) {
            selectedAnswers[currentQuestionIdx] = originalIndex;
            
            const currentQuestion = QUESTIONS[currentQuestionIdx];
            if (currentQuestion.axis === "archetype") {
                const arch = currentQuestion.answers[originalIndex].archetype;
                if (!archetypeDiscoveryOrder.includes(arch)) {
                    archetypeDiscoveryOrder.push(arch);
                }
            }
            
            renderQuestion();
        }

        function nextQuestion() {
            if (selectedAnswers[currentQuestionIdx] === null) {
                alert("Please select an option to continue your journey.");
                return;
            }

            if (currentQuestionIdx < QUESTIONS.length - 1) {
                currentQuestionIdx++;
                loadQuestionLayout();
            } else {
                calculateAndShowResults();
            }
        }

        function prevQuestion() {
            if (currentQuestionIdx > 0) {
                currentQuestionIdx--;
                loadQuestionLayout();
            }
        }

        function calculateAndShowResults() {
            const archetypeScores = { 'Pathwalker': 0, 'Ember-Keeper': 0, 'Metamorph': 0, 'Deep Eye': 0, 'Threader': 0 };
            let boundScore = 0;
            let unboundScore = 0;

            let archWeightIdx = 0;
            let orientWeightIdx = 0;

            // Process selections through completely independent math pipelines
            selectedAnswers.forEach((ansIdx, qIdx) => {
                const question = QUESTIONS[qIdx];
                const answerData = question.answers[ansIdx];
                
                if (question.axis === "archetype") {
                    const weight = ARCHETYPE_WEIGHTS[archWeightIdx++];
                    archetypeScores[answerData.archetype] += weight;
                } else if (question.axis === "orientation") {
                    const weight = ORIENTATION_WEIGHTS[orientWeightIdx++];
                    if (answerData.orientation === "Bound") {
                        boundScore += weight;
                    } else if (answerData.orientation === "Unbound") {
                        unboundScore += weight;
                    }
                }
            });

            // 1. Resolve Primary Archetype Axis
            let primaryArchetype = '';
            let maxArchScore = -1;
            
            for (const arch in archetypeScores) {
                const score = archetypeScores[arch];
                if (score > maxArchScore) {
                    maxArchScore = score;
                    primaryArchetype = arch;
                } else if (Math.abs(score - maxArchScore) < 0.001) {
                    const indexCurrentMax = archetypeDiscoveryOrder.indexOf(primaryArchetype);
                    const indexChallenger = archetypeDiscoveryOrder.indexOf(arch);
                    if (indexChallenger < indexCurrentMax) {
                        primaryArchetype = arch;
                    }
                }
            }

            // 2. Resolve Primary Orientation Axis cleanly
            let primaryOrientation = 'Bound';
            if (unboundScore > boundScore) {
                primaryOrientation = 'Unbound';
            } else if (Math.abs(unboundScore - boundScore) < 0.001) {
                primaryOrientation = Math.random() < 0.5 ? 'Bound' : 'Unbound'; // True balanced fallback
            }

            const resultData = ARCHETYPE_CONTENT[primaryArchetype][primaryOrientation];

            document.getElementById("questionSection").style.display = "none";
            document.getElementById("resultSection").style.display = "block";
            
            document.getElementById("resBadge").innerText = `${primaryArchetype.toUpperCase()} — ${primaryOrientation.toUpperCase()}`;
            document.getElementById("resPassportDesc").innerText = resultData.desc;
            document.getElementById("resMythTitle").innerText = resultData.mythTitle;
            document.getElementById("resMythSummary").innerText = resultData.mythText;
            document.getElementById("resCoreMessage").innerText = `Core Message: ${resultData.core}`;
            document.getElementById("resPromptText").innerText = resultData.prompt;
        }

        function retakeQuiz() {
            currentQuestionIdx = 0;
            selectedAnswers = new Array(QUESTIONS.length).fill(null);
            activeQuestionSubsets = new Array(QUESTIONS.length).fill(null);
            archetypeDiscoveryOrder = [];
            
            document.getElementById("resultSection").style.display = "none";
            document.getElementById("questionSection").style.display = "block";
            
            loadQuestionLayout();
        }
    </script>
</body>
