<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Unbound™ | Selfsploration Journey</title>
    <style>
        :root {
            --cotton-candy: #E8A0A8;
            --indigo: #4E038C;
            --bondi-blue: #0891B2;
            --ocean-mist: #14B8A6;
            --deep-twilight: #120F73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--indigo) 0%, var(--deep-twilight) 100%);
            color: white;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: Georgia, serif;
        }

        .logo-header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 2px solid var(--cotton-candy);
            margin-bottom: 2rem;
        }

        .logo-header h1 {
            font-size: 2.5rem;
            color: var(--cotton-candy);
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-style: italic;
            color: var(--ocean-mist);
        }

        .quiz-section {
            display: block;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--cotton-candy);
        }

        .scene-setting {
            font-style: italic;
            color: var(--ocean-mist);
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 3px solid var(--cotton-candy);
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .answer-btn {
            padding: 1rem;
            background: rgba(8, 145, 178, 0.3);
            border: 2px solid var(--bondi-blue);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .answer-btn:hover {
            background: var(--bondi-blue);
            transform: translateX(5px);
        }

        .answer-btn.selected {
            background: var(--cotton-candy);
            border-color: var(--indigo);
            color: var(--deep-twilight);
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            border: none;
        }

        .btn-primary {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--indigo);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--cotton-candy);
            color: var(--cotton-candy);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .progress-indicator {
            text-align: center;
            margin: 1rem 0;
            color: var(--ocean-mist);
        }

        .result-section {
            display: none;
            padding: 1rem;
        }

        .result-title {
            font-size: 2.2rem;
            color: var(--cotton-candy);
            text-align: center;
            margin-bottom: 2rem;
        }

        .passport-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--bondi-blue);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(15px);
            margin-bottom: 2rem;
        }

        .archetype-badge {
            display: inline-block;
            background: var(--indigo);
            color: var(--cotton-candy);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--cotton-candy);
        }

        .passport-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #f3f4f6;
        }

        .mythology-box {
            background: rgba(18, 15, 115, 0.6);
            border-left: 4px solid var(--ocean-mist);
            padding: 1.5rem;
            border-radius: 0 12px 12px 0;
            margin-bottom: 2rem;
        }

        .myth-title {
            color: var(--ocean-mist);
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
        }

        .myth-summary {
            font-style: italic;
            font-size: 1rem;
            color: #e5e7eb;
            margin-bottom: 1rem;
        }

        .core-message {
            font-weight: bold;
            color: var(--cotton-candy);
            border-top: 1px dashed rgba(232, 160, 168, 0.3);
            padding-top: 0.75rem;
        }

        .prompt-box {
            background: rgba(20, 184, 166, 0.15);
            border: 1px solid var(--ocean-mist);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
        }

        .prompt-title {
            color: var(--ocean-mist);
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .prompt-text {
            font-size: 1.1rem;
            font-family: Georgia, serif;
        }

        .restart-container {
            text-align: center;
        }

        .restart-btn {
            padding: 1rem 3rem;
            background: var(--ocean-mist);
            color: var(--deep-twilight);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="quizContainer">
        <div class="logo-header">
            <h1>Journey Unbound™</h1>
            <p class="tagline">Illuminate your story</p>
        </div>

        <!-- Main Quiz Interface -->
        <div class="quiz-section" id="questionSection">
            <div class="progress-indicator" id="progressIndicator">
                Question <span id="currentQuestionNumber">1</span> of 10
            </div>

            <div class="question-card">
                <div class="scene-setting" id="sceneSetting"></div>
                <h3 class="question-text" id="questionText"></h3>
                <div class="answer-options" id="answerOptions"></div>
            </div>

            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button>
            </div>
        </div>

        <!-- Matrix Calculated Results Display -->
        <div class="result-section" id="resultSection">
            <h2 class="result-title">Your Selfsploration™ Passport</h2>
            
            <div class="passport-card">
                <div class="archetype-badge" id="resBadge">Archetype × Orientation</div>
                <div class="passport-desc" id="resPassportDesc"></div>
                
                <div class="mythology-box">
                    <h3 class="myth-title" id="resMythTitle">Mythological Mirror</h3>
                    <div class="myth-summary" id="resMythSummary"></div>
                    <div class="core-message" id="resCoreMessage"></div>
                </div>

                <div class="prompt-box">
                    <div class="prompt-title">Inquiry Prompt</div>
                    <div class="prompt-text" id="resPromptText"></div>
                </div>
            </div>

            <div class="restart-container">
                <button class="btn btn-primary restart-btn" onclick="retakeQuiz()">Retake Journey</button>
            </div>
        </div>
    </div>

    <script>
        // WEIGHT ENGINE: Linear Weight Progression Q1-Q10 (1.0 to 2.0)
        const WEIGHTS = [1.0, 1.111, 1.222, 1.333, 1.444, 1.556, 1.667, 1.778, 1.889, 2.0];

        const ARCHETYPE_CONTENT = {
            "Pathwalker": {

                    desc: "You are the Pathwalker, and you make your own way on purpose. Your values, boundaries, and desires are your tools. Each step teaches you something because making the path reveals new ground. The more you choose with intention, the more the landscape opens—showing crossings that were there all along, waiting for someone to walk them.",
                    mythTitle: "Ulysses of Ithaca — The Vowkeeper",

                    mythTitle: "Odin the Wanderer — The Seeker",

                }
            },

                    mythTitle: "Hestia — Keeper of the Hearth",
                    mythText: "Hestia stays at the center of the Greek gods’ halls, tending the sacred fire that must not go out. Every home and city keeps a hearth for her; embers from the mother fire light new ones so the line continues without breaking. She declines marriage and stays at the center, quiet and essential, ensuring warmth remains.",
                    core: "Protect the center. Keep the flame steady.",
                    prompt: "What is the core fire you must protect right now, even if everything else changes around it?"
                },
                "Unbound": {
                    desc: "Your inner fire moves outward. It warms rooms, sparks action, and invites others to feel their own warmth. You say what rises, when it rises. Your flame helps people believe in themselves.",
                    mythTitle: "Prometheus — The Firebringer",

                    core: "Share the spark. Let the flame spread.",
                    prompt: "What passion or truth are you keeping inside that needs to be shared with the world?"
                }
            },
            "Metamorph": {
                "Bound": {
                    desc: "Transformation is your craft. When change is needed, you choose it and set the terms. Each shift is deliberate. The you that emerges is shaped by your choices—not by accident.",
                    mythTitle: "The Alchemist — The Work of Great Art",
                    mythText: "In medieval laboratories, the alchemist purifies base metal inside a sealed vessel. Through deliberate stages—dissolution, calcination, distillation—the substance is broken down and reformed until it changes structural nature entirely. This transformation doesn't happen by accident; it requires precise fire and internal focus.",
                    core: "Direct the fire. Shape your own evolution.",
                    prompt: "What part of your life or identity are you actively dismantling to make room for what you choose to become?"
                },
                "Unbound": {
                    desc: "You change with the moment. When life turns, you take the shape it asks for and live it fully. You move this way—so attuned that transformation is already happening as you meet what comes.",
                    mythTitle: "Proteus — Shepherd of the Changing Deep",
                    mythText: "Proteus lives in the coastal caves of Egypt, herding the seals of Poseidon. He knows the depths of the sea and the future paths of men. When travelers catch him to ask for directions, he shifts instantly—becoming a lion, a leopard, a rushing river, a burning tree. He flows through every form until the visitor lets go of control.",
                    core: "Flow with the shift. Take the shape that releases you.",
                    prompt: "Where are you resisting a current transformation, and what happens if you stop fighting and change shape instead?"
                }
            },
            "Threader": {

                    desc: "You hold the threads of fate in your hands—past and present visible together. You read how they run, keep what moves you forward, and set down what doesn’t. Careful choices make the pattern align, and the path ahead eases.",
                    mythTitle: "Ariadne — Guide of the Core Line",
                    mythText: "Ariadne holds the key to the Labyrinth of Crete. She gives Theseus a ball of red thread, telling him to tie it to the entrance and unwind it as he steps into the darkness. When the monster is faced, the thread holds the pattern of his journey, letting him retrace his steps and find his way back to the light.",
                    core: "Hold the line. Trust the connection.",
                    prompt: "Which thread of fate will you follow now?"
                },
                "Unbound": {

                    mythText: "In Norse lore, the Norns—Urd, Verdandi, and Skuld—tend the roots of Yggdrasil. They fetch water and carve runes at the tree’s roots. There, they set each life’s thread of fate. As their weaving shifts, new crossings appear and the moment to act becomes clear.",
                    core: "Notice the opening. Move when it’s time.",
                    prompt: "What will you act on now?"

                    mythTitle: "Völva — Seer in the Circle",
                    mythText: "In Norse tradition, a völva sits inside a marked circle with a staff. People come to ask about harvest, storms, and war. She keeps silence, looks within, and then names the thing that is coming—good weather, a raid, a birth, an end.",
                    core: "Look within. The next right action will become clear.",
                    prompt: "What becomes clear when you look within?"

                    core: "Travel with eyes open. Share what’s coming.",
                    prompt: "What truth do you see right now that others are ignoring or missing?"

        const QUESTIONS = [
            {

                    { archetype: 'Metamorph', orientation: 'Unbound', direction: 1, text: "You feel the chasm activate within you — a transformation that's alive and expansive." },

                    { archetype: 'Pathwalker', orientation: 'Bound', direction: -1, text: "You move forward on your own path. Their choice is theirs. Yours is already taking shape ahead of you." },
                    { archetype: 'Pathwalker', orientation: 'Unbound', direction: 1, text: "You stay connected to their journey. Their divergence illuminates your own path." },
                    { archetype: 'Ember-Keeper', orientation: 'Bound', direction: -2, text: "You embrace what you shared — the history, connection, love, and respect for each others' journeys." },
                    { archetype: 'Ember-Keeper', orientation: 'Unbound', direction: 2, text: "You carry what you learned from them forward. The love and respect you shared becomes part of how you move into your own path." },
                    { archetype: 'Metamorph', orientation: 'Bound', direction: -2, text: "The divergence transforms you. You feel yourself becoming someone different through this separation." },
                    { archetype: 'Metamorph', orientation: 'Unbound', direction: 2, text: "You accept their divergence as a mirror of your own becoming — you're both transforming, just in different directions." },
                    { archetype: 'Deep Eye', orientation: 'Bound', direction: -2, text: "You look at what the divergence means. You see both paths clearly and accept what that separation shows you." },
                    { archetype: 'Deep Eye', orientation: 'Unbound', direction: 2, text: "You take a good look at what the divergence means — the shape of two lives becoming different. That observation gives you acceptance to move forward." },
                    { archetype: 'Threader', orientation: 'Bound', direction: -1, text: "The thread between you holds. Even as your paths diverge, the pattern that wove you together remains woven through both your stories." },
                    { archetype: 'Threader', orientation: 'Unbound', direction: 1, text: "You see the thread connecting your stories. You honor it as you both move forward, the pattern flowing in separate directions." }

            },
            {

            },
            {

            {

                answers: [

                ]
            },
            {
                id: 9,
                scene: "You know who you are now. You see clearly.",
                question: "From this understanding, what do you feel called to share?",
                answers: [

                    { archetype: 'Pathwalker', orientation: 'Unbound', direction: 2, text: "You share the paths you've forged so others can walk them." },
                    { archetype: 'Ember-Keeper', orientation: 'Bound', direction: -2, text: "You teach others how to tend what matters most to them." },
                    { archetype: 'Ember-Keeper', orientation: 'Unbound', direction: 2, text: "You help others trust their own ability to stoke their inner fire." },
                    { archetype: 'Metamorph', orientation: 'Bound', direction: -1, text: "Others see how to transform by watching your transformation progress." },
                    { archetype: 'Metamorph', orientation: 'Unbound', direction: 1, text: "You see transformation happening in others and confirm they're on the right path." },
                    { archetype: 'Threader', orientation: 'Bound', direction: -1, text: "You help others recognize the power they already hold within themselves." },
                    { archetype: 'Threader', orientation: 'Unbound', direction: 1, text: "You help others see that they can choose what direction their own life takes." },
                    { archetype: 'Deep Eye', orientation: 'Bound', direction: -2, text: "You share what you observe in others so they can see their own strength." },
                    { archetype: 'Deep Eye', orientation: 'Unbound', direction: 2, text: "You show others the possibilities they're not yet seeing." }
                ]
            },
            {
                id: 10,
                scene: "When you think you're exactly where you need to be.",
                question: "How do you recognize that you are?",
                answers: [
                    { archetype: 'Pathwalker', orientation: 'Bound', direction: -2, text: "You move forward uncertain of the way, and the path opens ahead of you, which signals to you you're on the right track." },
                    { archetype: 'Pathwalker', orientation: 'Unbound', direction: 2, text: "People gravitate toward you the moment you arrive, affirming to you that you are exactly where you need to be." },
                    { archetype: 'Ember-Keeper', orientation: 'Bound', direction: -2, text: "You notice a stillness and strength within you that wasn't there before." },
                    { archetype: 'Ember-Keeper', orientation: 'Unbound', direction: 2, text: "People are drawn to the energy you're radiating." },
                    { archetype: 'Metamorph', orientation: 'Bound', direction: -1, text: "Things that once challenged you now feel manageable." },
                    { archetype: 'Metamorph', orientation: 'Unbound', direction: 1, text: "You've recently begun radiating a passion and zest for life, drawing people in, confirming you're exactly where you need to be." },
                    { archetype: 'Threader', orientation: 'Bound', direction: -1, text: "Your direction feels right and things flow with increasing ease." },
                    { archetype: 'Threader', orientation: 'Unbound', direction: 1, text: "People start to show up for you exactly when you need them." },
                    { archetype: 'Deep Eye', orientation: 'Bound', direction: -2, text: "You feel a certainty that feels unshakeable." },
                    { archetype: 'Deep Eye', orientation: 'Unbound', direction: 2, text: "Someone recognizes the clarity and value of what you're observing, validating your view." }
                ]
            }
        ];

        let currentQuestionIdx = 0;
        let selectedAnswers = new Array(QUESTIONS.length).fill(null);
        let archetypeDiscoveryOrder = [];
        let activeQuestionSubsets = new Array(QUESTIONS.length).fill(null);

        window.onload = function() {
            loadQuestionLayout();
        };

        function loadQuestionLayout() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];

            if (activeQuestionSubsets[currentQuestionIdx] === null) {
                let choicePool = currentQuestion.answers.map((ans, idx) => ({ data: ans, originalIndex: idx }));
                let subset = [];

                while (subset.length < 3 && choicePool.length > 0) {
                    const randIndex = Math.floor(Math.random() * choicePool.length);
                    subset.push(choicePool[randIndex]);
                    choicePool.splice(randIndex, 1);
                }

                for (let i = subset.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [subset[i], subset[j]] = [subset[j], subset[i]];
                }

                activeQuestionSubsets[currentQuestionIdx] = subset;
            }

            renderQuestion();
        }

        function renderQuestion() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];
            document.getElementById("currentQuestionNumber").innerText = currentQuestionIdx + 1;
            document.getElementById("sceneSetting").innerText = currentQuestion.scene;
            document.getElementById("questionText").innerText = currentQuestion.question;
            
            document.getElementById("prevBtn").disabled = (currentQuestionIdx === 0);
            
            const nextBtn = document.getElementById("nextBtn");
            nextBtn.innerText = (currentQuestionIdx === QUESTIONS.length - 1) ? "View Results" : "Next";

            const optionsContainer = document.getElementById("answerOptions");
            optionsContainer.innerHTML = "";

            const lockedSubset = activeQuestionSubsets[currentQuestionIdx];

            lockedSubset.forEach((item) => {
                const button = document.createElement("button");
                button.className = "answer-btn";
                
                if (selectedAnswers[currentQuestionIdx] === item.originalIndex) {
                    button.classList.add("selected");
                }
                
                button.innerText = item.data.text;
                button.onclick = () => selectAnswer(item.originalIndex);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(originalIndex) {
            selectedAnswers[currentQuestionIdx] = originalIndex;
            
            const arch = QUESTIONS[currentQuestionIdx].answers[originalIndex].archetype;
            if (!archetypeDiscoveryOrder.includes(arch)) {
                archetypeDiscoveryOrder.push(arch);
            }
            
            renderQuestion();
        }

        function nextQuestion() {
            if (selectedAnswers[currentQuestionIdx] === null) {
                alert("Please select an option to continue your journey.");
                return;
            }

            if (currentQuestionIdx < QUESTIONS.length - 1) {
                currentQuestionIdx++;
                loadQuestionLayout();
            } else {
                calculateAndShowResults();
            }
        }

        function prevQuestion() {
            if (currentQuestionIdx > 0) {
                currentQuestionIdx--;
                loadQuestionLayout();
            }
        }

        function calculateAndShowResults() {
            const archetypeScores = { 'Pathwalker': 0, 'Ember-Keeper': 0, 'Metamorph': 0, 'Deep Eye': 0, 'Threader': 0 };
            let continuousOrientationBalance = 0; 

            selectedAnswers.forEach((ansIdx, qIdx) => {
                const answerData = QUESTIONS[qIdx].answers[ansIdx];
                const linearWeight = WEIGHTS[qIdx];
                
                archetypeScores[answerData.archetype] += linearWeight;
                continuousOrientationBalance += (answerData.direction * linearWeight);
            });

            let primaryArchetype = '';
            let maxArchScore = -1;
            
            for (const arch in archetypeScores) {
                const score = archetypeScores[arch];
                if (score > maxArchScore) {
                    maxArchScore = score;
                    primaryArchetype = arch;
                } else if (Math.abs(score - maxArchScore) < 0.001) {
                    const indexCurrentMax = archetypeDiscoveryOrder.indexOf(primaryArchetype);
                    const indexChallenger = archetypeDiscoveryOrder.indexOf(arch);
                    if (indexChallenger < indexCurrentMax) {
                        primaryArchetype = arch;
                    }
                }
            }

            let primaryOrientation = 'Bound';
            if (Math.abs(continuousOrientationBalance) < 0.001) {
                primaryOrientation = Math.random() < 0.5 ? 'Bound' : 'Unbound';
            } else if (continuousOrientationBalance > 0) {
                primaryOrientation = 'Unbound';
            }

            const resultData = ARCHETYPE_CONTENT[primaryArchetype][primaryOrientation];

            document.getElementById("questionSection").style.display = "none";
            document.getElementById("resultSection").style.display = "block";
            
            document.getElementById("resBadge").innerText = `${primaryArchetype.toUpperCase()} — ${primaryOrientation.toUpperCase()}`;
            document.getElementById("resPassportDesc").innerText = resultData.desc;
            document.getElementById("resMythTitle").innerText = resultData.mythTitle;
            document.getElementById("resMythSummary").innerText = resultData.mythText;
            document.getElementById("resCoreMessage").innerText = `Core Message: ${resultData.core}`;
            document.getElementById("resPromptText").innerText = resultData.prompt;
        }

        function retakeQuiz() {
            currentQuestionIdx = 0;
            selectedAnswers = new Array(QUESTIONS.length).fill(null);
            activeQuestionSubsets = new Array(QUESTIONS.length).fill(null);
            archetypeDiscoveryOrder = [];
            
            document.getElementById("resultSection").style.display = "none";
            document.getElementById("questionSection").style.display = "block";
            
            loadQuestionLayout();
        }
    </script>
