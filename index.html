<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Unbound™ | Selfsploration Journey</title>
    <style>
        :root {
            --cotton-candy: #E8A0A8;
            --indigo: #4E038C;
            --bondi-blue: #0891B2;
            --ocean-mist: #14B8A6;
            --deep-twilight: #120F73;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Trebuchet MS', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--indigo) 0%, var(--deep-twilight) 100%);
            color: white;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1, h2, h3 {
            font-family: Georgia, serif;
        }

        .logo-header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 2px solid var(--cotton-candy);
            margin-bottom: 2rem;
        }

        .logo-header h1 {
            font-size: 2.5rem;
            color: var(--cotton-candy);
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-style: italic;
            color: var(--ocean-mist);
        }

        .quiz-section {
            display: block;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: var(--cotton-candy);
        }

        .scene-setting {
            font-style: italic;
            color: var(--ocean-mist);
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            border-left: 3px solid var(--cotton-candy);
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .answer-btn {
            padding: 1rem;
            background: rgba(8, 145, 178, 0.3);
            border: 2px solid var(--bondi-blue);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .answer-btn:hover {
            background: var(--bondi-blue);
            transform: translateX(5px);
        }

        .answer-btn.selected {
            background: var(--cotton-candy);
            border-color: var(--indigo);
            color: var(--deep-twilight);
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            border: none;
        }

        .btn-primary {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--indigo);
            color: white;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--cotton-candy);
            color: var(--cotton-candy);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--cotton-candy);
            color: var(--deep-twilight);
        }

        .progress-indicator {
            text-align: center;
            margin: 1rem 0;
            color: var(--ocean-mist);
        }

        .result-section {
            display: none;
            padding: 1rem;
        }

        .result-title {
            font-size: 2.2rem;
            color: var(--cotton-candy);
            text-align: center;
            margin-bottom: 2rem;
        }

        .passport-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--bondi-blue);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(15px);
            margin-bottom: 2rem;
        }

        .archetype-badge {
            display: inline-block;
            background: var(--indigo);
            color: var(--cotton-candy);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--cotton-candy);
        }

        .passport-desc {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2rem;
            color: #f3f4f6;
        }

        .mythology-box {
            background: rgba(18, 15, 115, 0.6);
            border-left: 4px solid var(--ocean-mist);
            padding: 1.5rem;
            border-radius: 0 12px 12px 0;
            margin-bottom: 2rem;
        }

        .myth-title {
            color: var(--ocean-mist);
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
        }

        .myth-summary {
            font-style: italic;
            font-size: 1rem;
            color: #e5e7eb;
            margin-bottom: 1rem;
        }

        .core-message {
            font-weight: bold;
            color: var(--cotton-candy);
            border-top: 1px dashed rgba(232, 160, 168, 0.3);
            padding-top: 0.75rem;
        }

        .prompt-box {
            background: rgba(20, 184, 166, 0.15);
            border: 1px solid var(--ocean-mist);
            padding: 1.5rem;
            border-radius: 8px;
            margin-top: 1.5rem;
        }

        .prompt-title {
            color: var(--ocean-mist);
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .prompt-text {
            font-size: 1.1rem;
            font-family: Georgia, serif;
        }

        .restart-container {
            text-align: center;
        }

        .restart-btn {
            padding: 1rem 3rem;
            background: var(--ocean-mist);
            color: var(--deep-twilight);
            font-weight: bold;
        }
        
        .footer-note {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <div class="container" id="quizContainer">
        <div class="logo-header">
            <h1>Journey Unbound™</h1>
            <p class="tagline">Illuminate your story</p>
        </div>

        <!-- Main Quiz Interface -->
        <div class="quiz-section" id="questionSection">
            <div class="progress-indicator" id="progressIndicator">
                Question <span id="currentQuestionNumber">1</span> of 10
            </div>

            <div class="question-card">
                <div class="scene-setting" id="sceneSetting"></div>
                <h3 class="question-text" id="questionText"></h3>
                <div class="answer-options" id="answerOptions"></div>
            </div>

            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">Previous</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Next</button>
            </div>
        </div>

        <!-- Calculated Results Display -->
        <div class="result-section" id="resultSection">
            <h2 class="result-title">Your Selfsploration™ Passport</h2>
            
            <div class="passport-card">
                <div class="archetype-badge" id="resBadge">Archetype × Orientation</div>
                <div class="passport-desc" id="resPassportDesc"></div>
                
                <div class="mythology-box">
                    <h3 class="myth-title" id="resMythTitle">Mythological Mirror</h3>
                    <div class="myth-summary" id="resMythSummary"></div>
                    <div class="core-message" id="resCoreMessage"></div>
                </div>

                <div class="prompt-box">
                    <div class="prompt-title">Inquiry Prompt</div>
                    <div class="prompt-text" id="resPromptText"></div>
                </div>
            </div>

            <div class="restart-container">
                <button class="btn btn-primary restart-btn" onclick="retakeQuiz()">Retake Journey</button>
            </div>
        </div>
        
        <div class="footer-note">
            © 2026 Scarlet Woods / Journey Unbound Inc.™
        </div>
    </div>

                    { archetype: 'Threader', value: -1, orientation: 'Bound', text: "I look at the pattern of their past choices and point out where this fits." },
                    { archetype: 'Threader', value: 1, orientation: 'Unbound', text: "I share my reasoning and invite dialogue." },
                    { archetype: 'Deep Eye', value: -2, orientation: 'Bound', text: "I offer my honest perspective with warmth and respect." },
                    { archetype: 'Deep Eye', value: 2, orientation: 'Unbound', text: "I notice the emotional current between us and adjust my tone to hold space." }
                ]
            },
            {
                id: 8,
                scene: "You find yourself with a good amount of free time between commitments and decide to spend it on yourself.",
                question: "What is the first thing you do for yourself?",
                answers: [
                    { archetype: 'Pathwalker', value: -2, orientation: 'Bound', text: "I choose one small action that moves me toward a personal goal." },
                    { archetype: 'Pathwalker', value: 2, orientation: 'Unbound', text: "I take a long walk outside, soaking in nature." },
                    { archetype: 'Ember-Keeper', value: -2, orientation: 'Bound', text: "I prepare a nourishing meal for myself." },
                    { archetype: 'Ember-Keeper', value: 2, orientation: 'Unbound', text: "I create a cozy atmosphere that invites a sense of safety and ease." },
                    { archetype: 'Metamorph', value: -1, orientation: 'Bound', text: "I pause to notice what part of me needs tending right now." },
                    { archetype: 'Metamorph', value: 1, orientation: 'Unbound', text: "I indulge in a creative activity that reconnects me." },
                    { archetype: 'Threader', value: -1, orientation: 'Bound', text: "I check the rhythm of my day and adjust my pace to match my energy." },
                    { archetype: 'Threader', value: 1, orientation: 'Unbound', text: "I reach out to someone I care about for connection." },
                    { archetype: 'Deep Eye', value: -2, orientation: 'Bound', text: "I spend time meditating or quieting my mind." },
                    { archetype: 'Deep Eye', value: 2, orientation: 'Unbound', text: "I listen to music or a favorite podcast while resting." }
                ]
            },
            {
                id: 9,
                scene: "A friend looks at you and offers you a genuine compliment about who you are. It is specific and it lands.",
                question: "How do you respond?",
                answers: [
                    { archetype: 'Pathwalker', value: -2, orientation: 'Bound', text: "I accept the truth of their words and store it as fuel for my journey." },
                    { archetype: 'Pathwalker', value: 2, orientation: 'Unbound', text: "I feel grateful and respond with a smile." },
                    { archetype: 'Ember-Keeper', value: -2, orientation: 'Bound', text: "I modestly brush it off and redirect the conversation." },
                    { archetype: 'Ember-Keeper', value: 2, orientation: 'Unbound', text: "I return the compliment or share my gratitude openly." },
                    { archetype: 'Metamorph', value: -1, orientation: 'Bound', text: "I let the compliment reshape how I see myself for a moment." },
                    { archetype: 'Metamorph', value: 1, orientation: 'Unbound', text: "I share how hearing this changes my mood and lifts my spirits." },
                    { archetype: 'Threader', value: -1, orientation: 'Bound', text: "I acknowledge the compliment and express my appreciation." },
                    { archetype: 'Threader', value: 1, orientation: 'Unbound', text: "I acknowledge the beauty of their perception and how it weaves us closer." },
                    { archetype: 'Deep Eye', value: -2, orientation: 'Bound', text: "I thank them warmly and accept it inwardly." },
                    { archetype: 'Deep Eye', value: 2, orientation: 'Unbound', text: "I watch the warmth spread in my chest and let it guide my smile." }
                ]
            },
            {
                id: 10,
                scene: "After a warm visit with a close friend, you are walking home. The time you spent together is still with you.",
                question: "What do you feel on your walk home?",
                answers: [
                    { archetype: 'Pathwalker', value: -2, orientation: 'Bound', text: "I carry the clarity of our connection as a steady compass for my next steps." },
                    { archetype: 'Pathwalker', value: 2, orientation: 'Unbound', text: "I feel energized and motivated." },
                    { archetype: 'Ember-Keeper', value: -2, orientation: 'Bound', text: "I savor the moment of human connection." },
                    { archetype: 'Ember-Keeper', value: 2, orientation: 'Unbound', text: "I carry a sense of gratitude and openness." },
                    { archetype: 'Metamorph', value: -1, orientation: 'Bound', text: "I notice how the experience has softened my inner landscape." },
                    { archetype: 'Metamorph', value: 1, orientation: 'Unbound', text: "I feel inspired by the connection we shared." },
                    { archetype: 'Threader', value: -1, orientation: 'Bound', text: "I reflect on the pattern of care we shared and how it strengthens our bond." },
                    { archetype: 'Threader', value: 1, orientation: 'Unbound', text: "I think about what I want to share next with my friend." },
                    { archetype: 'Deep Eye', value: -2, orientation: 'Bound', text: "Warmth and contentment fill me." },
                    { archetype: 'Deep Eye', value: 2, orientation: 'Unbound', text: "I feel the lingering resonance of our conversation echoing in the quiet street." }
                ]
            }
        ];

        // ENGINE MATRIX DISTRIBUTION MAP (Guarantees balance while pulling exclusively 3 options per question)
        const ASSIGNED_ROTATION_MAP = [
            [ {a: 'Pathwalker', o: 'Bound'},   {a: 'Ember-Keeper', o: 'Unbound'}, {a: 'Metamorph', o: 'Bound'} ],   // Q1
            [ {a: 'Pathwalker', o: 'Unbound'}, {a: 'Metamorph', o: 'Unbound'}, {a: 'Threader', o: 'Bound'} ],     // Q2
            [ {a: 'Ember-Keeper', o: 'Bound'},   {a: 'Threader', o: 'Unbound'}, {a: 'Deep Eye', o: 'Bound'} ],     // Q3
            [ {a: 'Pathwalker', o: 'Bound'},   {a: 'Deep Eye', o: 'Unbound'}, {a: 'Threader', o: 'Bound'} ],     // Q4
            [ {a: 'Ember-Keeper', o: 'Unbound'}, {a: 'Metamorph', o: 'Bound'},   {a: 'Deep Eye', o: 'Unbound'} ],   // Q5
            [ {a: 'Pathwalker', o: 'Unbound'}, {a: 'Ember-Keeper', o: 'Bound'},   {a: 'Threader', o: 'Unbound'} ],   // Q6
            [ {a: 'Metamorph', o: 'Unbound'}, {a: 'Deep Eye', o: 'Bound'},     {a: 'Pathwalker', o: 'Bound'} ],   // Q7
            [ {a: 'Ember-Keeper', o: 'Bound'},   {a: 'Threader', o: 'Bound'},     {a: 'Deep Eye', o: 'Unbound'} ],   // Q8
            [ {a: 'Pathwalker', o: 'Unbound'}, {a: 'Ember-Keeper', o: 'Unbound'}, {a: 'Metamorph', o: 'Bound'} ],   // Q9
            [ {a: 'Metamorph', o: 'Unbound'}, {a: 'Threader', o: 'Unbound'},   {a: 'Deep Eye', o: 'Bound'} ]      // Q10
        ];

        let currentQuestionIdx = 0;
        let selectedAnswers = new Array(QUESTIONS.length).fill(null);
        let archetypeDiscoveryOrder = [];
        let activeQuestionSubsets = new Array(QUESTIONS.length).fill(null);

        window.onload = function() {
            loadQuestionLayout();
        };

        function loadQuestionLayout() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];

            if (activeQuestionSubsets[currentQuestionIdx] === null) {
                const targetLayout = ASSIGNED_ROTATION_MAP[currentQuestionIdx];
                let subset = [];

                targetLayout.forEach(target => {
                    const foundIndex = currentQuestion.answers.findIndex(ans => 
                        ans.archetype === target.a && ans.orientation === target.o
                    );
                    if (foundIndex !== -1) {
                        subset.push({
                            data: currentQuestion.answers[foundIndex],
                            originalIndex: foundIndex
                        });
                    }
                });

                if (subset.length < 3) {
                    subset = [];
                    let choicePool = currentQuestion.answers.map((ans, idx) => ({ data: ans, originalIndex: idx }));
                    while (subset.length < 3 && choicePool.length > 0) {
                        const randIndex = Math.floor(Math.random() * choicePool.length);
                        subset.push(choicePool[randIndex]);
                        choicePool.splice(randIndex, 1);
                    }
                }
                activeQuestionSubsets[currentQuestionIdx] = subset;
            }

            renderQuestion();
        }

        function renderQuestion() {
            const currentQuestion = QUESTIONS[currentQuestionIdx];
            document.getElementById("currentQuestionNumber").innerText = currentQuestionIdx + 1;
            document.getElementById("sceneSetting").innerText = currentQuestion.scene;
            document.getElementById("questionText").innerText = currentQuestion.question;
            
            document.getElementById("prevBtn").disabled = (currentQuestionIdx === 0);
            
            const nextBtn = document.getElementById("nextBtn");
            nextBtn.innerText = (currentQuestionIdx === QUESTIONS.length - 1) ? "View Results" : "Next";

            const optionsContainer = document.getElementById("answerOptions");
            optionsContainer.innerHTML = "";

            const lockedSubset = activeQuestionSubsets[currentQuestionIdx];

            lockedSubset.forEach((item) => {
                const button = document.createElement("button");
                button.className = "answer-btn";
                
                if (selectedAnswers[currentQuestionIdx] === item.originalIndex) {
                    button.classList.add("selected");
                }
                
                button.innerText = item.data.text;
                button.onclick = () => selectAnswer(item.originalIndex);
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(originalIndex) {
            selectedAnswers[currentQuestionIdx] = originalIndex;
            
            const currentQuestion = QUESTIONS[currentQuestionIdx];
            const arch = currentQuestion.answers[originalIndex].archetype;
            if (!archetypeDiscoveryOrder.includes(arch)) {
                archetypeDiscoveryOrder.push(arch);
            }
            
            renderQuestion();
        }

        function nextQuestion() {
            if (selectedAnswers[currentQuestionIdx] === null) {
                alert("Please select an option to continue your journey.");
                return;
            }

            if (currentQuestionIdx < QUESTIONS.length - 1) {
                currentQuestionIdx++;
                loadQuestionLayout();
            } else {
                calculateAndShowResults();
            }
        }

        function prevQuestion() {
            if (currentQuestionIdx > 0) {
                currentQuestionIdx--;
                loadQuestionLayout();
            }
        }

        function calculateAndShowResults() {
            const archetypeScores = { 'Pathwalker': 0, 'Ember-Keeper': 0, 'Metamorph': 0, 'Deep Eye': 0, 'Threader': 0 };
            let orientationCumulativeScore = 0;

            selectedAnswers.forEach((ansIdx, qIdx) => {
                const question = QUESTIONS[qIdx];
                const answerData = question.answers[ansIdx];
                
                archetypeScores[answerData.archetype] += 1;
                orientationCumulativeScore += answerData.value;
            });

            let primaryArchetype = '';
            let maxArchScore = -1;
            
            for (const arch in archetypeScores) {
                const score = archetypeScores[arch];
                if (score > maxArchScore) {
                    maxArchScore = score;
                    primaryArchetype = arch;
                } else if (score === maxArchScore) {
                    const indexCurrentMax = archetypeDiscoveryOrder.indexOf(primaryArchetype);
                    const indexChallenger = archetypeDiscoveryOrder.indexOf(arch);
                    if (indexChallenger < indexCurrentMax) {
                        primaryArchetype = arch;
                    }
                }
            }

            let primaryOrientation = 'Bound';
            if (orientationCumulativeScore > 0) {
                primaryOrientation = 'Unbound';
            } else if (orientationCumulativeScore === 0) {
                primaryOrientation = Math.random() < 0.5 ? 'Bound' : 'Unbound';
            }

            const resultData = ARCHETYPE_CONTENT[primaryArchetype][primaryOrientation];

            document.getElementById("questionSection").style.display = "none";
            document.getElementById("resultSection").style.display = "block";
            
            document.getElementById("resBadge").innerText = `${primaryArchetype.toUpperCase()} — ${primaryOrientation.toUpperCase()}`;
            document.getElementById("resPassportDesc").innerText = resultData.desc;
            document.getElementById("resMythTitle").innerText = resultData.mythTitle;
            document.getElementById("resMythSummary").innerText = resultData.mythText;
            document.getElementById("resCoreMessage").innerText = `Core Message: ${resultData.core}`;
            document.getElementById("resPromptText").innerText = resultData.prompt;
        }

        function retakeQuiz() {
            currentQuestionIdx = 0;
            selectedAnswers = new Array(QUESTIONS.length).fill(null);
            activeQuestionSubsets = new Array(QUESTIONS.length).fill(null);
            archetypeDiscoveryOrder = [];
            
            document.getElementById("resultSection").style.display = "none";
            document.getElementById("questionSection").style.display = "block";
            
            loadQuestionLayout();
        }
    </script>
